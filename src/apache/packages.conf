# packages.ubuntu.com virtual host (managed by the ubuntu-packages charm).
#
# Apache 2.4 compatible configuration derived from the upstream
# conf/apache.conf.sed.in shipped with the application. TLS termination is
# expected to be handled by a front-end proxy; this vhost serves plain HTTP.

<Directory /srv/packages.ubuntu.com/www/>
    # The application ships pre-rendered index pages; -Indexes suppresses
    # automatic directory listings without disabling the (essential) autoindex
    # module system-wide.
    Options +MultiViews +FollowSymLinks -Indexes
    AddHandler type-map var
    AddDefaultCharset utf-8
    AllowOverride AuthConfig FileInfo
    Require all granted

    # Caching.
    ExpiresActive On
    ExpiresDefault "access plus 1 day"
    ExpiresByType image/gif  "modification plus 1 year"
    ExpiresByType image/jpeg "modification plus 1 year"
    ExpiresByType image/png  "modification plus 1 year"

    # Content negotiation languages. Keep in sync with
    # lib/Packages/I18N/Locale.pm (%lang2charset).
    AddLanguage en .en
    AddLanguage en-us .en-us
    AddLanguage en-gb .en-gb
    AddLanguage ar .ar
    AddLanguage bg .bg
    AddLanguage ca .ca
    AddLanguage cs .cs
    AddLanguage da .da
    AddLanguage de .de
    AddLanguage el .el
    AddLanguage eo .eo
    AddLanguage es .es
    AddLanguage fi .fi
    AddLanguage fr .fr
    AddLanguage hr .hr
    AddLanguage hu .hu
    AddLanguage id .id
    AddLanguage it .it
    AddLanguage ja .ja
    AddLanguage ko .ko
    AddLanguage lt .lt
    AddLanguage nl .nl
    AddLanguage no .no
    AddLanguage nb .nb
    AddLanguage pl .pl
    AddLanguage pt .pt
    AddLanguage pt-pt .pt_PT
    AddLanguage pt-br .pt_BR
    AddLanguage ro .ro
    AddLanguage ru .ru
    AddLanguage sk .sk
    AddLanguage sl .sl
    AddLanguage sv .sv_SE
    AddLanguage tr .tr
    AddLanguage uk .uk
    AddLanguage zh-CN .zh-cn
    AddLanguage zh-HK .zh-hk
    AddLanguage zh-TW .zh-tw
    LanguagePriority en fr de it es ja pl hr da pt pt-pt pt-br fi zh-cn zh-hk zh-tw cs sv sv-se ko no nb ru tr uk eo ar nl hu ro sk el ca en-us en-gb id lt sl bg

    DirectoryIndex index

    # RSS.
    AddType application/rss+xml .rdf .xml

    RemoveType .gz
    AddEncoding x-gzip .gz
</Directory>

<VirtualHost *:80>
    ServerName packages.ubuntu.com
    DocumentRoot /srv/packages.ubuntu.com/www/

    ErrorLog ${APACHE_LOG_DIR}/packages.ubuntu.com-error.log
    CustomLog ${APACHE_LOG_DIR}/packages.ubuntu.com-access.log combined

    ScriptAlias /cgi-bin/ /srv/packages.ubuntu.com/cgi-bin/

    PerlModule ModPerl::Registry
    PerlTaintCheck On
    PerlRequire /srv/packages.ubuntu.com/bin/mod_perl-startup
    PerlSwitches -T
    <Location /cgi-bin/>
        SetHandler perl-script
        PerlResponseHandler ModPerl::Registry
        Options +ExecCGI
        PerlSendHeader On
        Require all granted
    </Location>

    BrowserMatch reportbug is_reportbug

    RewriteEngine on

    RewriteMap changelog-url txt:/srv/packages.ubuntu.com/files/changelogs-map

    RewriteRule ^/cgi-bin/search_packages.pl(.*)$ /search$1
    RewriteRule ^/cgi-bin/search_contents.pl(.*)$ /search$1

    # URLs we never rewrite.
    RewriteRule ^/cgi-bin/dispatcher.pl - [L]
    RewriteRule ^/changelogs/ - [L]
    RewriteRule ^/Pics/ - [L]
    RewriteRule ^/about/ - [L]
    RewriteRule ^/ubuntu/ - [L]
    RewriteRule ^/[^/]+\.css - [L]
    RewriteRule ^/[^/]+\.js - [L]
    RewriteRule ^/favicon.ico$ - [L]
    RewriteRule ^/robots.txt$ - [L]

    RewriteRule ^/$ /index [L]
    RewriteRule ^/changelog:(.+)$ /changelogs/${changelog-url:$1} [R,L,NE]
    RewriteRule ^/src:([^/]+)$ /search?searchon=sourcenames&keywords=$1 [R,L,NE]
    RewriteRule ^/file:(.+)$ /search?searchon=contents&keywords=$1 [R,L,NE]
</VirtualHost>
